name: Production Build & Release

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: 'Custom name for the build'
        required: false
        default: 'manual-build'
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android, i686-linux-android

      - name: Setup Android NDK
        id: setup-ndk
        run: |
          # Use the latest NDK available on the runner to avoid version mismatch
          ANDROID_NDK_PATH=$(ls -d ${ANDROID_SDK_ROOT}/ndk/* | tail -1)
          echo "ANDROID_NDK_HOME=${ANDROID_NDK_PATH}" >> $GITHUB_ENV
          echo "NDK path set to: ${ANDROID_NDK_PATH}"

      - name: Build Rust Engine & Android APK
        run: |
          # Detect if project is in a subfolder or root
          if [ -d "android-app" ]; then
            cd android-app
          fi
          
          # Use gradlew if it exists, otherwise use system gradle
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleRelease
          else
            echo "Gradlew not found, using system gradle..."
            gradle assembleRelease
          fi

      - name: Prepare Artifact
        run: |
          # Find the generated APK in any sub-build-folder
          APK_PATH=$(find . -name "*release*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: APK not found"
            exit 1
          fi
          cp "$APK_PATH" appt-agent-v3.3.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name == 'main' && format('manual-{0}', github.run_number) || github.ref_name }}
          files: appt-agent-v3.3.apk
          name: Appointment Agent ${{ github.event.inputs.build_name || github.ref_name }}
          body: |
            ## High Fidelity Appointment Agent Build
            - Trigger: ${{ github.event_name }}
            - Rust Core: BoringSSL / rquest Mimicry
            - Microsecond Precision Strike Logic
            - Android 8-16 Compatibility
            - Encrypted Credential Storage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
